<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Insight — Auth Redesign Preview</title>
    <style>
      /* --- Theme tokens (mirrors web/src/app/css/colors.css subset) --- */
      :root {
        --bg-canvas: #ffffff;
        --bg-tint-00: #ffffff;
        --bg-tint-01: #fafafa;
        --border-01: rgba(0, 0, 0, 0.08);
        --border-02: rgba(0, 0, 0, 0.12);
        --text-01: #4d4d4d;
        --text-03: #555555;
        --text-05: #1c1c1c;
        --theme-primary-05: #1c1c1c;
        --blue-50: #286df8;
        --blue-40: #508afb;
        --blue-20: #9bbeff;
        --blue-05: #e7effc;
        --shadow-card: 0 20px 60px -20px rgba(15, 23, 42, 0.18),
          0 8px 24px -12px rgba(15, 23, 42, 0.08);
        --chip-bg: rgba(255, 255, 255, 0.55);
        --chip-border: rgba(255, 255, 255, 0.7);
        --grid-dot: rgba(15, 23, 42, 0.06);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg-canvas: #0a0a0a;
          --bg-tint-00: #141414;
          --bg-tint-01: #1a1a1a;
          --border-01: rgba(255, 255, 255, 0.08);
          --border-02: rgba(255, 255, 255, 0.14);
          --text-01: #a4a4a4;
          --text-03: #cccccc;
          --text-05: #ebebeb;
          --theme-primary-05: #e9e9e9;
          --shadow-card: 0 20px 60px -20px rgba(0, 0, 0, 0.7),
            0 8px 24px -12px rgba(0, 0, 0, 0.5);
          --chip-bg: rgba(20, 20, 20, 0.55);
          --chip-border: rgba(255, 255, 255, 0.08);
          --grid-dot: rgba(255, 255, 255, 0.05);
        }
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI",
          Roboto, "Helvetica Neue", Arial, sans-serif;
        color: var(--text-05);
        background: var(--bg-canvas);
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      /* --- Stage --- */
      .stage {
        position: relative;
        min-height: 100vh;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      /* --- Backdrop layers --- */
      .backdrop { position: absolute; inset: 0; pointer-events: none; }

      .grid-dots {
        position: absolute;
        inset: 0;
        background-image: radial-gradient(var(--grid-dot) 1px, transparent 1px);
        background-size: 24px 24px;
        mask-image: radial-gradient(ellipse at center, #000 35%, transparent 80%);
        -webkit-mask-image: radial-gradient(ellipse at center, #000 35%, transparent 80%);
      }

      .blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.55;
      }
      .blob.a {
        width: 560px; height: 560px;
        top: -160px; left: -120px;
        background: radial-gradient(circle, var(--blue-50) 0%, transparent 70%);
      }
      .blob.b {
        width: 620px; height: 620px;
        bottom: -200px; right: -160px;
        background: radial-gradient(circle, #7a5cff 0%, transparent 70%);
        opacity: 0.4;
      }
      .blob.c {
        width: 380px; height: 380px;
        top: 30%; right: 15%;
        background: radial-gradient(circle, #2cd2c5 0%, transparent 70%);
        opacity: 0.18;
      }
      @media (prefers-color-scheme: dark) {
        .blob.a { opacity: 0.35; }
        .blob.b { opacity: 0.28; }
        .blob.c { opacity: 0.15; }
      }

      /* --- Floating feature chips --- */
      .chips {
        position: absolute;
        inset: 0;
      }
      @media (max-width: 900px) { .chips { display: none; } }

      .chip {
        position: absolute;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        background: var(--chip-bg);
        border: 1px solid var(--chip-border);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-radius: 999px;
        font-size: 13px;
        line-height: 1;
        color: var(--text-05);
        box-shadow: 0 6px 20px -8px rgba(15, 23, 42, 0.18);
        white-space: nowrap;
        animation: float 9s ease-in-out infinite;
      }
      .chip svg {
        width: 14px; height: 14px;
        color: var(--blue-50);
        flex-shrink: 0;
      }
      .chip.dot { color: var(--text-03); }

      /* Positions — pulled away from the centered card */
      .chip.c1 { top: 14%; left: 8%;  animation-delay: 0s; }
      .chip.c2 { top: 24%; left: 22%; animation-delay: 1.1s; }
      .chip.c3 { top: 62%; left: 6%;  animation-delay: 2.4s; }
      .chip.c4 { top: 78%; left: 22%; animation-delay: 3.6s; }
      .chip.c5 { top: 16%; right: 8%; animation-delay: 0.6s; }
      .chip.c6 { top: 30%; right: 22%; animation-delay: 1.7s; }
      .chip.c7 { top: 66%; right: 6%; animation-delay: 2.9s; }
      .chip.c8 { top: 80%; right: 22%; animation-delay: 4.1s; }

      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50%      { transform: translateY(-6px); }
      }
      @media (prefers-reduced-motion: reduce) {
        .chip { animation: none; }
      }

      /* --- Glass auth card --- */
      .card {
        position: relative;
        z-index: 10;
        width: 100%;
        max-width: 420px;
        background: color-mix(in srgb, var(--bg-tint-00) 80%, transparent);
        backdrop-filter: blur(20px) saturate(140%);
        -webkit-backdrop-filter: blur(20px) saturate(140%);
        border: 1px solid var(--border-01);
        border-radius: 20px;
        box-shadow: var(--shadow-card);
        padding: 28px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 44px; height: 44px;
        margin-bottom: 14px;
      }

      h1 {
        margin: 0 0 4px;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.01em;
        color: var(--text-05);
      }
      .sub {
        margin: 0 0 22px;
        font-size: 14px;
        color: var(--text-03);
      }

      /* Form */
      .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
      .label { font-size: 12px; font-weight: 600; color: var(--text-03); }
      .input {
        width: 100%;
        padding: 11px 12px;
        font-size: 14px;
        font-family: inherit;
        color: var(--text-05);
        background: var(--bg-tint-01);
        border: 1px solid var(--border-02);
        border-radius: 10px;
        outline: none;
        transition: border-color 120ms, box-shadow 120ms;
      }
      .input::placeholder { color: var(--text-01); opacity: 0.7; }
      .input:focus {
        border-color: var(--blue-50);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--blue-50) 22%, transparent);
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        padding: 12px 14px;
        font-size: 14px;
        font-weight: 600;
        font-family: inherit;
        border-radius: 10px;
        border: 1px solid transparent;
        cursor: pointer;
        transition: transform 120ms, opacity 120ms, background 120ms;
      }
      .btn:active { transform: scale(0.99); }
      .btn-primary {
        background: var(--text-05);
        color: var(--bg-tint-00);
      }
      .btn-primary:hover { opacity: 0.92; }
      .btn-secondary {
        background: var(--bg-tint-00);
        color: var(--text-05);
        border-color: var(--border-02);
      }
      .btn-secondary:hover { background: var(--bg-tint-01); }
      .btn svg { width: 16px; height: 16px; flex-shrink: 0; }

      .divider {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 16px 0;
        color: var(--text-01);
        font-size: 12px;
      }
      .divider::before, .divider::after {
        content: ""; flex: 1; height: 1px; background: var(--border-01);
      }

      .footer {
        margin-top: 22px;
        text-align: center;
        font-size: 13px;
        color: var(--text-03);
      }
      .footer a {
        color: var(--text-05);
        font-weight: 600;
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      .legal {
        margin-top: 10px;
        text-align: center;
        font-size: 11px;
        color: var(--text-01);
      }

      /* Tiny sign-in spinner area (visual only) */
      .arrow { transition: transform 120ms; }
      .btn-primary:hover .arrow { transform: translateX(2px); }
    </style>
  </head>
  <body>
    <main class="stage">
      <!-- Backdrop -->
      <div class="backdrop" aria-hidden="true">
        <div class="blob a"></div>
        <div class="blob b"></div>
        <div class="blob c"></div>
        <div class="grid-dots"></div>

        <div class="chips">
          <!-- Sparkle: Agentic RAG -->
          <span class="chip c1">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.9 4.6L18.5 9.5l-4.6 1.9L12 16l-1.9-4.6L5.5 9.5l4.6-1.9z"/><path d="M19 14v4M17 16h4"/></svg>
            Agentic RAG
          </span>
          <!-- Network graph: Deep Research -->
          <span class="chip c2">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="2.5"/><circle cx="18" cy="6" r="2.5"/><circle cx="12" cy="18" r="2.5"/><path d="M7.7 7.6l3 7.4M16.3 7.6l-3 7.4M8.5 6h7"/></svg>
            Deep Research
          </span>
          <!-- Globe: Web Search -->
          <span class="chip c3">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg>
            Web Search
          </span>
          <!-- Brush: Image Generation -->
          <span class="chip c4">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l4-4M3 21l3-1 8-8-2-2-8 8z"/><path d="M14 6l4 4 3-3-4-4z"/></svg>
            Image Generation
          </span>
          <!-- MCP plug: Actions & MCP -->
          <span class="chip c5">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 2v6M15 2v6M6 8h12v4a6 6 0 0 1-12 0z"/><path d="M12 18v4"/></svg>
            Actions & MCP
          </span>
          <!-- Code brackets: Code Execution -->
          <span class="chip c6">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6l-5 6 5 6M16 6l5 6-5 6M14 4l-4 16"/></svg>
            Code Execution
          </span>
          <!-- Microphone: Voice Mode -->
          <span class="chip c7">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="3" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v4"/></svg>
            Voice Mode
          </span>
          <!-- Linked dots: 50+ Connectors -->
          <span class="chip c8">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 14a4 4 0 0 0 5.7 0l3-3a4 4 0 0 0-5.7-5.7l-1 1"/><path d="M14 10a4 4 0 0 0-5.7 0l-3 3a4 4 0 0 0 5.7 5.7l1-1"/></svg>
            50+ Connectors
          </span>
        </div>
      </div>

      <!-- Glass card -->
      <section class="card" aria-label="Sign in to Insight">
        <div class="brand" aria-hidden="true">
          <!-- Insight brand mark: italic 'i' inside a circle, theme-primary-05 -->
          <svg width="44" height="44" viewBox="0 0 64 64" fill="none" aria-hidden="true">
            <circle cx="32" cy="32" r="28" fill="none" stroke="currentColor" stroke-width="4" style="color: var(--theme-primary-05)" />
            <text x="32" y="48" text-anchor="middle"
                  font-family="Georgia, 'Times New Roman', serif"
                  font-style="italic" font-size="42" font-weight="700"
                  style="fill: var(--theme-primary-05)">i</text>
          </svg>
        </div>

        <h1>Welcome back</h1>
        <p class="sub">Sign in to your AI workspace — powered by Insight.</p>

        <form onsubmit="event.preventDefault()">
          <div class="field">
            <label class="label" for="email">Email Address</label>
            <input class="input" id="email" type="email" placeholder="email@yourcompany.com" autocomplete="email" />
          </div>
          <div class="field">
            <label class="label" for="password">Password</label>
            <input class="input" id="password" type="password" placeholder="∗∗∗∗∗∗∗∗∗∗∗∗" autocomplete="current-password" />
          </div>

          <button type="submit" class="btn btn-primary">
            <span>Sign In</span>
            <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9 9l4 3-4 3M8 12h6"/></svg>
          </button>

          <div class="divider"><span>or</span></div>

          <button type="button" class="btn btn-secondary">
            <!-- Google G mark -->
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path fill="#EA4335" d="M12 10.2v3.9h5.5c-.2 1.4-1.6 4-5.5 4-3.3 0-6-2.7-6-6.1s2.7-6.1 6-6.1c1.9 0 3.1.8 3.8 1.5l2.6-2.5C16.7 3.4 14.6 2.5 12 2.5 6.8 2.5 2.6 6.7 2.6 12s4.2 9.5 9.4 9.5c5.4 0 9-3.8 9-9.2 0-.6-.1-1.1-.2-1.6H12z"/>
              <path fill="#34A853" d="M3.9 7.3l3.2 2.4c.9-1.7 2.7-3 4.9-3 1.4 0 2.4.6 3 1.1l2.2-2.2C15.6 4.3 14 3.5 12 3.5c-3.3 0-6.1 1.9-7.4 4.7z" opacity=".0"/>
              <path fill="#4285F4" d="M21 12.3c0-.6-.1-1.1-.2-1.6H12v3.4h5.1c-.3 1.4-1.7 3.5-5.1 3.5-3.3 0-6-2.7-6-6.1s2.7-6.1 6-6.1c1.9 0 3.1.8 3.8 1.5l2.6-2.5C16.7 3.4 14.6 2.5 12 2.5 6.8 2.5 2.6 6.7 2.6 12s4.2 9.5 9.4 9.5c5.4 0 9-3.8 9-9.2z"/>
              <path fill="#FBBC05" d="M2.6 12c0-1.1.2-2.2.6-3.2L0 6.4A11.5 11.5 0 0 0 0 12c0 1.9.5 3.8 1.4 5.4L4.5 15c-.4-.9-.6-2-.6-3z" opacity=".0"/>
            </svg>
            Continue with Google
          </button>
        </form>

        <p class="footer">
          New to Insight?
          <a href="#">Create an account</a>
        </p>
      </section>
    </main>
  </body>
</html>
